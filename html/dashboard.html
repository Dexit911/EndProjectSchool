<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallet Dashboard</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="../js/main.js"></script>
</head>
<body>
    <main class="dashboard">
        <section class="balance-section">
            <p class="balance-label">Wallet balance</p>
            <h1>17.98 USD</h1>
        </section>

        <section class="action-buttons">
            <button class="action-btn">Send</button>
            <button class="action-btn">Receive</button>
        </section>

        <section class="vault-card box">
            <div class="vault-top">
                <div class="vault-left">
                    <div class="token-square"></div>
                    <div>
                        <h2>HampiCoin</h2>
                        <p>xTOKEN</p>
                    </div>
                </div>

                <div class="vault-right">
                    <p class="small-text">Revaluation</p>
                    <h3>+100%</h3>
                </div>
            </div>

            <button class="participate-btn">Participate</button>
        </section>

        <section class="tokens-header">
            <h2>Tokens</h2>
        </section>

        <section class="tokens-list box">
            <div class="token-row">
                <div class="token-left">
                    <div class="token-square small"></div>
                    <div>
                        <h3>xCuprum</h3>
                        <p>xCUP</p>
                    </div>
                </div>
                <div class="token-right">
                    <h3>0</h3>
                    <p>0.00 USD</p>
                </div>
            </div>

            <div class="token-row">
                <div class="token-left">
                    <div class="token-square small"></div>
                    <div>
                        <h3>Ethereum</h3>
                        <p>ETH</p>
                    </div>
                </div>
                <div class="token-right">
                    <h3>0.0079</h3>
                    <p>18.38 USD</p>
                </div>
            </div>
             <div class="token-row">
                <div class="token-left">
                    <div class="token-square small"></div>
                    <div>
                        <h3>Bitcoin</h3>
                        <p>BTC</p>
                    </div>
                </div>
                <div class="token-right">
                    <h3>0.0079</h3>
                    <p>18.38 USD</p>
                </div>
            </div>
             <div class="token-row">
                <div class="token-left">
                    <div class="token-square small"></div>
                    <div>
                        <h3>Ripple</h3>
                        <p>XRP</p>
                    </div>
                </div>
                <div class="token-right">
                    <h3>0.0079</h3>
                    <p>18.38 USD</p>
                </div>
            </div>

            <div class="token-row">
                <div class="token-left">
                    <div class="token-square small"></div>
                    <div>
                        <h3>Solana</h3>
                        <p>SOL</p>
                    </div>
                </div>
                <div class="token-right">
                    <h3>11003.03</h3>
                    <p>10.676767 USD</p>
                </div>
            </div>
        </section>
        <div id="hotbar-container"></div>
    </main>
</body>
</html>
